<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Programação 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px 20px; background: #f4f7f6; margin: 0; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 18px; margin-bottom: 30px; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; max-width: 800px; margin: 0 auto; }
        .btn { display: inline-block; padding: 20px 40px; background: #0070f3; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s, background 0.2s; }
        .btn:hover { background: #0051a8; transform: translateY(-2px); }
        .btn-a { background: #2ecc71; } .btn-a:hover { background: #27ae60; }
        .btn-b { background: #3498db; } .btn-b:hover { background: #2980b9; }
        .btn-c { background: #9b59b6; } .btn-c:hover { background: #8e44ad; }
        .btn-d { background: #e67e22; } .btn-d:hover { background: #d35400; }
    </style>
</head>
<body>
    <h1>💻 Portal de Programação - Primeiros Anos</h1>
    <p>Selecione a sua turma abaixo para acessar o conteúdo atualizado das aulas:</p>
    
    <div class="grid">
        <a href="./turma-1a" class="btn btn-a">Turma 1A</a>
        <a href="./turma-1b" class="btn btn-b">Turma 1B</a>
        <a href="./turma-1c" class="btn btn-c">Turma 1C</a>
        <a href="./turma-1d" class="btn btn-d">Turma 1D</a>
    </div>
</body>
</html>
