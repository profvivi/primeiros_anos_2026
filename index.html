<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal das Turmas 2026</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        h1 { color: #333; }
        .grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 15px 30px; background: #0070f3; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 18px; }
        .btn:hover { background: #0051a8; }
    </style>
</head>
<body>
    <h1>💻 Bem-vindo ao Portal de Programação</h1>
    <p>Selecione a sua turma abaixo para acessar o conteúdo atualizado:</p>
    
    <div class="grid">
        <!-- Ajuste o nome depois da barra se suas pastas forem diferentes -->
        <a href="./turma-1a" class="btn">Turma 1A</a>
        <a href="./turma-1b" class="btn">Turma 1B</a>
        <a href="./turma-1c" class="btn">Turma 1C</a>
        <a href="./turma-1d" class="btn">Turma 1D</a>
    </div>
</body>
</html>
